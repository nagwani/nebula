name: Card Container
machineName: card_container
status: true
required:
  - layout
  - textColor
props:
  properties:
    preHeading:
      title: Pre Heading
      type: string
      examples:
        - Featured services
    heading:
      title: Heading
      type: string
      examples:
        - What we offer.
    headingSize:
      title: Heading Size
      type: string
      examples:
        - large
      enum:
        - extra_large
        - large
        - medium
        - small
      meta:enum:
        extra_large: Extra Large
        large: Large
        medium: Medium
        small: Small
    textColor:
      title: Text Color
      type: string
      examples:
        - dark
      enum:
        - dark
        - light
      meta:enum:
        dark: Dark
        light: Light
    headingPosition:
      title: Heading Position
      type: string
      examples:
        - center_aligned
      enum:
        - left_aligned
        - center_aligned
        - right_aligned
      meta:enum:
        left_aligned: Left aligned
        center_aligned: Center aligned
        right_aligned: Right aligned
    headingElement:
      title: Heading Element
      type: string
      examples:
        - h2
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
    layout:
      title: Layout
      type: string
      examples:
        - 33-33-33
      enum:
        - 50-50
        - 33-33-33
        - 50-25-25
        - 25-25-50
        - 25-25-25-25
      meta:enum:
        50-50: 50-50
        33-33-33: 33-33-33
        50-25-25: 50-25-25
        25-25-50: 25-25-50
        25-25-25-25: 25-25-25-25
slots:
  content:
    title: Content
