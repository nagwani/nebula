name: Card
machineName: card
status: true
required:
  - layout
  - linkVariant
props:
  properties:
    image:
      title: Image
      type: object
      examples:
        - src: >-
            https://placehold.co/800x600@2x.png?alternateWidths=https%3A%2F%2Fplacehold.co%2F%7Bwidth%7Dx%7Bheight%7D%402x.png
          alt: Example image placeholder
          width: 800
          height: 600
      $ref: json-schema-definitions://canvas.module/image
    layout:
      title: Layout
      type: string
      examples:
        - Left aligned
      enum:
        - Left aligned
        - Center aligned
        - Right aligned
      meta:enum:
        Left aligned: Left aligned
        Center aligned: Center aligned
        Right aligned: Right aligned
    heading:
      title: Heading
      type: string
      examples:
        - Feature or benefit
    headingElement:
      title: Heading Element
      type: string
      examples:
        - h3
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
    text:
      title: Text
      type: string
      examples:
        - >-
          Help people become familiar with the organization and its offerings,
          creating a sense of connection and trust.
      contentMediaType: text/html
      x-formatting-context: block
    link:
      title: Link
      type: string
      examples:
        - /
      format: uri-reference
    linkLabel:
      title: Link Label
      type: string
    linkVariant:
      title: Link Variant
      type: string
      examples:
        - Link
      enum:
        - Solid
        - Outline Dark
        - Link
        - Link Underline
      meta:enum:
        Solid: Solid
        Outline Dark: Outline Dark
        Link: Link
        Link Underline: Link Underline
slots: []
