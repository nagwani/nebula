name: Two Column Text
machineName: two_column_text
status: true
required:
  - layout
  - headingElement
  - headingSize
  - textColor
props:
  properties:
    image:
      title: Image
      type: object
      examples:
        - src: >-
            https://placehold.co/800x600@2x.png?alternateWidths=https%3A%2F%2Fplacehold.co%2F%7Bwidth%7Dx%7Bheight%7D%402x.png
          alt: Example image placeholder
          width: 800
          height: 600
      $ref: json-schema-definitions://canvas.module/image
    layout:
      title: Layout
      type: string
      examples:
        - Left Aligned
      enum:
        - Left Aligned
        - Centered
      meta:enum:
        Left Aligned: Left Aligned
        Centered: Centered
    preHeading:
      title: Pre Heading
      type: string
      examples:
        - Mission
    heading:
      title: Heading
      type: string
      examples:
        - This space deserves a hero.
    headingElement:
      title: Heading Element
      type: string
      examples:
        - h2
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
    headingSize:
      title: Heading Size
      type: string
      examples:
        - Large
      enum:
        - Extra Large
        - Large
        - Medium
        - Small
      meta:enum:
        Extra Large: Extra Large
        Large: Large
        Medium: Medium
        Small: Small
    text:
      title: Text
      type: string
      examples:
        - >-
          This is a space to welcome visitors to the site. Grab their attention
          with copy that clearly states what the site is about.
      contentMediaType: text/html
      x-formatting-context: block
    textColor:
      title: Text Color
      type: string
      examples:
        - Dark
      enum:
        - Dark
        - Light
      meta:enum:
        Dark: Dark
        Light: Light
slots:
  buttons:
    title: Buttons
