name: Card Container
machineName: card_container
status: true
required:
  - layout
  - textColor
props:
  properties:
    preHeading:
      title: Pre Heading
      type: string
      examples:
        - Featured services
    heading:
      title: Heading
      type: string
      examples:
        - What we offer.
    headingSize:
      title: Heading Size
      type: string
      examples:
        - Large
      enum:
        - Extra Large
        - Large
        - Medium
        - Small
      meta:enum:
        Extra Large: Extra Large
        Large: Large
        Medium: Medium
        Small: Small
    textColor:
      title: Text Color
      type: string
      examples:
        - Dark
      enum:
        - Dark
        - Light
      meta:enum:
        Dark: Dark
        Light: Light
    headingPosition:
      title: Heading Position
      type: string
      examples:
        - Center aligned
      enum:
        - Left aligned
        - Center aligned
        - Right aligned
      meta:enum:
        Left aligned: Left aligned
        Center aligned: Center aligned
        Right aligned: Right aligned
    headingLevel:
      title: Heading Level
      type: string
      examples:
        - h2
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
    layout:
      title: Layout
      type: string
      examples:
        - 33-33-33
      enum:
        - 50-50
        - 33-33-33
        - 50-25-25
        - 25-25-50
        - 25-25-25-25
      meta:enum:
        50-50: 50-50
        33-33-33: 33-33-33
        50-25-25: 50-25-25
        25-25-50: 25-25-50
        25-25-25-25: 25-25-25-25
slots:
  content:
    title: Content
