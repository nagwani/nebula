name: Card
machineName: card
status: true
required:
  - layout
  - linkVariant
props:
  properties:
    image:
      title: Image
      type: object
      examples:
        - src: >-
            https://placehold.co/800x600@2x.png?alternateWidths=https%3A%2F%2Fplacehold.co%2F%7Bwidth%7Dx%7Bheight%7D%402x.png
          alt: Example image placeholder
          width: 800
          height: 600
      $ref: json-schema-definitions://canvas.module/image
    layout:
      title: Layout
      type: string
      examples:
        - left_aligned
      enum:
        - left_aligned
        - center_aligned
        - right_aligned
      meta:enum:
        left_aligned: Left aligned
        center_aligned: Center aligned
        right_aligned: Right aligned
    heading:
      title: Heading
      type: string
      examples:
        - Feature or benefit
    headingElement:
      title: Heading Element
      type: string
      examples:
        - h3
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: h1
        h2: h2
        h3: h3
        h4: h4
        h5: h5
        h6: h6
    text:
      title: Text
      type: string
      examples:
        - >-
          Help people become familiar with the organization and its offerings,
          creating a sense of connection and trust.
      contentMediaType: text/html
      x-formatting-context: block
    link:
      title: Link
      type: string
      examples:
        - /
      format: uri-reference
    linkLabel:
      title: Link Label
      type: string
    linkVariant:
      title: Link Variant
      type: string
      examples:
        - link
      enum:
        - solid
        - outline_dark
        - link
        - link_underline
      meta:enum:
        solid: Solid
        outline_dark: Outline Dark
        link: Link
        link_underline: Link Underline
slots: []
